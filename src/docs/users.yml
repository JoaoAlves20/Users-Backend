paths:
  /login:
    post:
      summary: Autentica o usuário e retorna um token JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Sucesso ao autenticar
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        401:
          description: Credenciais incorretas

  /users:
    get:
      summary: Lista todos os usuários
      description: ADMIN vê tudo; Usuário comum vê apenas username e email.
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de usuários
        404:
          description: Nenhum usuário encontrado

    post:
      summary: Cria um novo usuário (Apenas ADMIN)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        201:
          description: Usuário criado com sucesso
        400:
          description: Dados inválidos

  /users/{id}:
    get:
      summary: Busca usuário por ID
      description: ADMIN vê tudo; Usuário comum vê apenas username e email.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Usuário encontrado
        404:
          description: Usuário não encontrado

    put:
      summary: Atualiza um usuário (Apenas ADMIN)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        200:
          description: Usuário atualizado
        400:
          description: Erro na atualização

    delete:
      summary: Deleta um usuário (Apenas ADMIN)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Usuário deletado
        400:
          description: Erro ao deletar

components:
  schemas:
    UserCreate:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
    UserUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string